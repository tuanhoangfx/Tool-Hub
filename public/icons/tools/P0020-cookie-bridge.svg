<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="cb-cookie" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="0.45" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#B45309"/>
    </radialGradient>
    <radialGradient id="cb-bite" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#451A03"/>
      <stop offset="1" stop-color="#78350F"/>
    </radialGradient>
    <filter id="cb-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main cookie body (full canvas, no container background) -->
  <g filter="url(#cb-shadow)">
    <!-- Cookie with bite -->
    <path d="M32 4
             A28 28 0 1 0 60 32
             A8 8 0 0 1 52 24
             A6 6 0 0 1 46 18
             A4 4 0 0 1 42 14
             A28 28 0 0 0 32 4 Z"
          fill="url(#cb-cookie)"
          stroke="#78350F" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Bite mark highlights (3 small craters at bite edge) -->
    <circle cx="50" cy="22" r="2.2" fill="url(#cb-bite)"/>
    <circle cx="44" cy="16" r="1.6" fill="url(#cb-bite)"/>
    <circle cx="54" cy="28" r="1.4" fill="url(#cb-bite)"/>
  </g>

  <!-- Chocolate chips (5 prominent, with subtle highlight) -->
  <g>
    <circle cx="20" cy="22" r="3.5" fill="#3F1D0E"/>
    <circle cx="19.2" cy="21.2" r="1.2" fill="#7C3F1F" opacity="0.65"/>

    <circle cx="36" cy="18" r="3" fill="#3F1D0E"/>
    <circle cx="35.4" cy="17.4" r="1" fill="#7C3F1F" opacity="0.65"/>

    <circle cx="14" cy="36" r="3.2" fill="#3F1D0E"/>
    <circle cx="13.3" cy="35.3" r="1.1" fill="#7C3F1F" opacity="0.65"/>

    <circle cx="38" cy="40" r="3.8" fill="#3F1D0E"/>
    <circle cx="37" cy="39" r="1.3" fill="#7C3F1F" opacity="0.65"/>

    <circle cx="26" cy="46" r="3" fill="#3F1D0E"/>
    <circle cx="25.4" cy="45.4" r="1" fill="#7C3F1F" opacity="0.65"/>

    <circle cx="48" cy="46" r="2.4" fill="#3F1D0E"/>
    <circle cx="47.5" cy="45.6" r="0.9" fill="#7C3F1F" opacity="0.65"/>
  </g>

  <!-- Sparkle accent (sync vibe - subtle, top-left) -->
  <g opacity="0.95">
    <path d="M10 12 L11 14 L13 15 L11 16 L10 18 L9 16 L7 15 L9 14 Z" fill="#22D3EE"/>
    <circle cx="10" cy="15" r="0.8" fill="#FFFFFF"/>
  </g>
</svg>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/hub-boot.css" />
    <title>Tool Hub</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
        color: #e8ecff;
      }
      #root {
        min-height: 100%;
        height: 100%;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("tool-hub-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else if (t === "light") {
          /* classic light */
        } else {
          document.documentElement.classList.add("theme-hub");
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            document.documentElement.classList.add("fonts-loaded");
          });
        } else {
          document.documentElement.classList.add("fonts-loaded");
        }
      })();
    </script>
  </head>
  <body>
    <div id="hub-boot-loader" class="hub-boot-loader--pane" role="status" aria-label="Loading Tool Hub">
      <div class="hub-boot-orb" aria-hidden="true">
        <span class="hub-boot-orb__ring"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--dash"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--inner"></span>
        <span class="hub-boot-orb__core">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <rect width="7" height="7" x="3" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="14" rx="1" />
            <rect width="7" height="7" x="3" y="14" rx="1" />
          </svg>
        </span>
      </div>
    </div>
    <div id="root"></div>
    <script src="/hub-boot-fallback.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
